services:
  - type: web
    name: hermit-quiz-arena
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: ALLOW_GUESTS
        value: "true"
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false
