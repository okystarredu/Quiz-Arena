services:
  - type: web
    name: hermit-quiz-arena
    runtime: node
    plan: free
    buildCommand: rm -rf node_modules package-lock.json && npm install --omit=dev --no-package-lock
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.20.0"
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false
      - key: MINI_APP_SHORT_NAME
        value: ""
      - key: DATA_DIR
        value: /tmp/hermit-data
      - key: ALLOW_GUESTS
        value: "false"
