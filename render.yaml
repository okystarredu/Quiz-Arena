services:
  - type: web
    name: hermit-quiz-arena
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false
      - key: MINI_APP_SHORT_NAME
        value: ""
      - key: DATA_DIR
        value: /tmp/hermit-data
      - key: ALLOW_GUESTS
        value: "false"
